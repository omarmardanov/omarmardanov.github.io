<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OG default</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f4f4f4;
    --mute: #cfcfcf;
    --mute-2: #8a8a8a;
    --brand: #5a3b25;
    --brand-2: #b9886a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 64px;
    padding: 80px;
    align-items: center;
  }
  .logo {
    width: 320px;
    height: 320px;
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo img {
    width: 78%;
    height: 78%;
    display: block;
    filter: brightness(0) invert(1);
  }
  .content {
    display: flex;
    flex-direction: column;
    gap: 36px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mute-2);
    line-height: 1;
  }
  .title {
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    font-size: 76px;
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .title em {
    font-style: italic;
    color: var(--brand-2);
    font-weight: 500;
  }
  .footer-line {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mute);
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .footer-line .dot {
    width: 4px;
    height: 4px;
    background: var(--brand-2);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="logo">
    <img src="../../Logo1m.svg" alt="" width="320" height="320">
  </div>
  <div class="content">
    <div class="title">Партнёр в&nbsp;сложных делах <em>от&nbsp;Роспатента до&nbsp;Верховного&nbsp;Суда</em></div>
    <div class="footer-line">
      <span>1-tm.ru</span>
      <span class="dot"></span>
      <span>Москва</span>
      <span class="dot"></span>
      <span>Тюмень</span>
      <span class="dot"></span>
      <span>1300+&nbsp;товарных знаков</span>
    </div>
  </div>
</body>
</html>
