<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Стрелка вправо: длинная плоская — для CTA-кнопок и section-head action -->
  <symbol id="arrow-right" viewBox="0 0 28 10">
    <path d="M0 5 H25" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="square"/>
    <path d="M21 1 L26 5 L21 9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="square"/>
  </symbol>

  <!-- Стрелка ↗ для внешних/«перейти на карты» -->
  <symbol id="arrow-up-right" viewBox="0 0 16 16">
    <path d="M5 11 11 5M6 5h5v5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Шеврон вниз (caret для меню/select) -->
  <symbol id="chevron-down" viewBox="0 0 12 12">
    <path d="m3 4.5 3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Закрытие (X) -->
  <symbol id="close" viewBox="0 0 16 16">
    <path d="m3 3 10 10M13 3 3 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Очистка ввода (backspace) -->
  <symbol id="backspace" viewBox="0 0 20 16">
    <path d="M6.5 1.5h11A1.5 1.5 0 0 1 19 3v10a1.5 1.5 0 0 1-1.5 1.5h-11L1 8l5.5-6.5Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="m9 6 5 5m0-5-5 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </symbol>

  <!-- Поиск (лупа) -->
  <symbol id="search" viewBox="0 0 22 22">
    <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="m15 15 5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Копировать -->
  <symbol id="copy" viewBox="0 0 16 16">
    <rect x="5" y="5" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5" fill="none" stroke="currentColor" stroke-width="1.3"/>
  </symbol>

  <!-- Галочка (toast success) -->
  <symbol id="check" viewBox="0 0 16 16">
    <path d="m3 8 4 4 6-8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Карта (булавка) — для адреса в футере -->
  <symbol id="map-pin" viewBox="0 0 16 16">
    <path d="M8 14s5-4.4 5-8.5a5 5 0 0 0-10 0C3 9.6 8 14 8 14Z" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <circle cx="8" cy="6" r="1.8" fill="none" stroke="currentColor" stroke-width="1.3"/>
  </symbol>

  <!-- Телефон -->
  <symbol id="phone" viewBox="0 0 16 16">
    <path d="M3 3.5C3 2.7 3.7 2 4.5 2H6c.5 0 .9.3 1 .8L7.7 5c.1.4 0 .8-.3 1L6.5 7c.7 1.5 1.8 2.6 3.3 3.3l1-.9c.3-.3.7-.4 1.1-.3l2.2.7c.5.1.8.5.8 1V12.5c0 .8-.7 1.5-1.5 1.5C7.7 14 2 8.3 3 3.5Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
  </symbol>

  <!-- Email -->
  <symbol id="mail" viewBox="0 0 16 16">
    <rect x="2" y="3.5" width="12" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <path d="M2.5 4.5 8 9l5.5-4.5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
  </symbol>

  <!-- Бумажный самолётик — «Отправить»; направлен в верхний правый угол -->
  <symbol id="send" viewBox="0 0 16 16">
    <path d="M14.5 1.5 1.5 6.5 7 8.5l2 6 5.5-13Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    <path d="M14.5 1.5 7 8.5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  </symbol>

  <!-- Прикрепить файл -->
  <symbol id="paperclip" viewBox="0 0 16 16">
    <path d="m12.5 7.5-5 5a3 3 0 0 1-4.2-4.2l5.5-5.5a2 2 0 0 1 2.8 2.8l-5.5 5.5a1 1 0 0 1-1.4-1.4l5-5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Информация (для подсказок) -->
  <symbol id="info" viewBox="0 0 16 16">
    <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <path d="M8 7v4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="8" cy="5" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- Ошибка (для form invalid) -->
  <symbol id="alert" viewBox="0 0 16 16">
    <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <path d="M8 5v4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="8" cy="11" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- WhatsApp — Tabler outline brand-whatsapp (24×24 stroke) -->
  <symbol id="whatsapp" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 21l1.65 -3.8a9 9 0 1 1 3.4 2.9l-5.05 .9"/>
      <path d="M9 10a.5 .5 0 0 0 1 0v-1a.5 .5 0 0 0 -1 0v1a5 5 0 0 0 5 5h1a.5 .5 0 0 0 0 -1h-1a.5 .5 0 0 0 0 1"/>
    </g>
  </symbol>

  <!-- Telegram — svgrepo.com/447799 (64×64 stroke outline): фирменный самолётик
       с правильной геометрией хвоста и подзагибом. -->
  <symbol id="telegram" viewBox="0 0 64 64">
    <path d="M26.67,38.57l-.82,11.54A2.88,2.88,0,0,0,28.14,49l5.5-5.26,11.42,8.35c2.08,1.17,3.55.56,4.12-1.92l7.49-35.12h0c.66-3.09-1.08-4.33-3.16-3.55l-44,16.85C6.47,29.55,6.54,31.23,9,32l11.26,3.5L45.59,20.71c1.23-.83,2.36-.37,1.44.44Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  </symbol>
</svg>
