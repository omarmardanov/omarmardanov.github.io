<!--
  HEAD — общий блок <head> для всех страниц.

  В каждой странице:
  • заменить <title> и <meta name="description">
  • подключить ТОЛЬКО нужные page-specific CSS из assets/css/pages/
  • для главной — НЕ добавлять class="page-body-light" на body и НЕ
    подключать direction.css/service.css/mktu*.css
  • при использовании главной (transparent header) НЕ подключать base.css
    напрямую — она уже импортирует --header-h, но проверьте, что class="page"
    не используется (см. base.css)

  OG / Twitter / canonical вставляются автоматически скриптом scripts/add-meta.py
  между маркерами <!-- :og:start --> ... <!-- :og:end --> после <meta description>.
  Запускать после изменения title/description, после создания новой страницы,
  и после обновления og:image. См. блок в любой существующей странице как пример.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СТРАНИЦА · Galifanov, Malkov &amp; Partners</title>
<meta name="description" content="Описание страницы для поисковиков (~150 символов)">

<!-- :og:start / :og:end — генерируется scripts/add-meta.py, см. комментарий выше -->
